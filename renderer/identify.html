<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    html, body { margin: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
    body {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: #fff; font-family: Menlo, monospace; border: 2px solid #3fa9f5; box-sizing: border-box;
    }
    .num { font-size: 96px; font-weight: bold; color: #3fa9f5; line-height: 1; }
    .lbl { font-size: 15px; margin-top: 10px; opacity: 0.85; text-align: center; padding: 0 10px; }
    .res { font-size: 12px; margin-top: 4px; opacity: 0.6; }
  </style>
</head>
<body>
  <div class="num"></div>
  <div class="lbl"></div>
  <div class="res"></div>
  <script>
    const q = new URLSearchParams(location.search);
    document.querySelector('.num').textContent = q.get('n') || '?';
    document.querySelector('.lbl').textContent = q.get('label') || '';
    document.querySelector('.res').textContent = q.get('res') || '';
  </script>
</body>
</html>
